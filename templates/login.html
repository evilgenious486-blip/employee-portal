<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Employee Portal</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>

<div class="login-bg">

    <div class="login-box">

        <div class="logo">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="logo">
        </div>

        <h2>Employee Portal</h2>

        <form method="POST">

            <input type="text"
                   name="email"
                   placeholder="Email or Employee Code"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</div>

</body>
</html>
