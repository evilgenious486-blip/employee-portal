{% extends "base.html" %}
{% set title = "Login" %}

{% block public_content %}

<div class="login-page">

  <div class="login-box">

      <div class="logo-area">
          <img src="{{ url_for('static', filename='images/pacost_logo.png') }}" class="company-logo">
      </div>

      <h1 class="portal-title">
          Employee Login Portal
      </h1>

      {% if error %}
      <div class="alert alert-danger mt-3">
          {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="{{ url_for('login') }}" autocomplete="off">

          <input type="text" style="display:none">
          <input type="password" style="display:none">

          <div class="mb-3">
              <label class="form-label">Email or Employee Code</label>

              <input
                  type="text"
                  class="form-control login-input"
                  name="identifier"
                  required
                  autocomplete="off"
              >
          </div>

          <div class="mb-3">
              <label class="form-label">Password</label>

              <input
                  type="password"
                  class="form-control login-input"
                  name="password"
                  required
                  autocomplete="new-password"
              >
          </div>

          <div class="text-end mb-3">
              <a href="{{ url_for('forgot_password') }}" class="forgot-link">
                  Forgot password?
              </a>
          </div>

          <button type="submit" class="login-btn">
              Login
          </button>

      </form>

  </div>

</div>


<style>

.login-page{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#f5f7fb;
}

.login-box{
    width:100%;
    max-width:420px;
    background:white;
    padding:45px 38px;
    border-radius:18px;
    box-shadow:0 18px 45px rgba(0,0,0,0.08);
    text-align:center;
}

.logo-area{
    margin-bottom:25px;
}

.company-logo{
    width:180px;
    height:auto;
}

.portal-title{
    font-size:26px;
    font-weight:700;
    margin-bottom:25px;
    color:#1e293b;
}

.login-input{
    height:52px;
    border-radius:10px;
    border:1px solid #e2e8f0;
    font-size:15px;
}

.login-input:focus{
    border-color:#f58220;
    box-shadow:0 0 0 2px rgba(245,130,32,0.15);
}

.login-btn{
    width:100%;
    height:52px;
    border:none;
    border-radius:10px;
    background:#f58220;
    color:white;
    font-size:16px;
    font-weight:600;
}

.login-btn:hover{
    background:#ea580c;
}

.forgot-link{
    font-size:13px;
    text-decoration:none;
    color:#2563eb;
}

</style>

{% endblock %}
