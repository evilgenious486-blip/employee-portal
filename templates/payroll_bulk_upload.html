{% extends 'base.html' %}
{% block content %}
<h3 class="mb-4">Bulk Upload Payslips (Excel)</h3>
<div class="card border-0 shadow-sm rounded-4"><div class="card-body">
<p class="text-secondary">Upload an .xlsx file with columns: <strong>employee_code, month_label, basic_salary, allowances, deductions</strong></p>
<form method="post" enctype="multipart/form-data">
<div class="mb-3"><input class="form-control" type="file" name="file" accept=".xlsx" required></div>
<button class="btn btn-primary">Upload</button> <a class="btn btn-outline-secondary" href="{{ url_for('payroll_view') }}">Back</a>
</form>
</div></div>
{% endblock %}
