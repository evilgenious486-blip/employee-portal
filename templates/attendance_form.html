
{% extends 'base.html' %}
{% block content %}
<h3 class="mb-4">{{ 'Edit Attendance' if record else 'Add Attendance' }}</h3>
<div class="card border-0 shadow-sm rounded-4"><div class="card-body">
  <form method="post" class="row g-3">
    <div class="col-md-4"><label class="form-label">Employee</label><select class="form-select" name="user_id" required>{% for emp in employees %}<option value="{{ emp.id }}" {% if record and record.user_id==emp.id %}selected{% endif %}>{{ emp.full_name }}</option>{% endfor %}</select></div>
    <div class="col-md-3"><label class="form-label">Date</label><input type="date" class="form-control" name="attendance_date" value="{{ record.attendance_date if record else '' }}" required></div>
    <div class="col-md-2"><label class="form-label">Check In</label><input type="time" class="form-control" name="check_in" value="{{ record.check_in if record else '' }}"></div>
    <div class="col-md-2"><label class="form-label">Check Out</label><input type="time" class="form-control" name="check_out" value="{{ record.check_out if record else '' }}"></div>
    <div class="col-md-3"><label class="form-label">Status</label><select class="form-select" name="status">{% for s in statuses %}<option value="{{ s }}" {% if record and record.status==s %}selected{% endif %}>{{ s }}</option>{% endfor %}</select></div>
    <div class="col-md-2"><label class="form-label">Hours Worked</label><input type="number" step="0.25" class="form-control" name="hours_worked" value="{{ record.hours_worked if record else '' }}" placeholder="Auto if blank"></div>
    <div class="col-md-2"><label class="form-label">OT Hours</label><input type="number" step="0.25" class="form-control" name="ot_hours" value="{{ record.ot_hours if record else '' }}" placeholder="Auto on holiday"></div>
    <div class="col-12"><label class="form-label">Remarks</label><textarea class="form-control" name="remarks" rows="3">{{ record.remarks if record else '' }}</textarea></div>
    <div class="col-12 d-flex gap-2"><button class="btn btn-primary">Save</button><a class="btn btn-outline-secondary" href="{{ url_for('attendance_view') }}">Cancel</a></div>
  </form>
</div></div>
{% endblock %}
