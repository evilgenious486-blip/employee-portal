{% extends 'base.html' %}
{% block content %}
<h3 class="mb-4">Auto Generate Payslips from Attendance</h3>
<div class="card border-0 shadow-sm rounded-4"><div class="card-body">
<form method="post" class="row g-3 align-items-end">
<div class="col-md-3"><label class="form-label">Month</label><input class="form-control" type="month" name="month" value="{{ month }}" required></div>
<div class="col-md-5"><label class="form-label">Employee</label><select class="form-select" name="user_id"><option value="">All active employees</option>{% for emp in employees %}<option value="{{ emp.id }}">{{ emp.full_name }} ({{ emp.employee_code }})</option>{% endfor %}</select></div>
<div class="col-md-4"><button class="btn btn-primary">Generate</button> <a class="btn btn-outline-secondary" href="{{ url_for('payroll_view') }}">Back</a></div>
</form>
<p class="text-secondary mt-3 mb-0">Formula: Net Salary = Monthly Basic + Default Allowances - attendance based deductions.</p>
</div></div>
{% endblock %}
