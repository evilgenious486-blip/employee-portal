
{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4"><h3 class="mb-0">Holiday / Vacation Calendar</h3><a class="btn btn-outline-secondary" href="{{ url_for('attendance_view') }}">Back to Attendance</a></div>
<div class="row g-4">
  <div class="col-lg-5"><div class="card border-0 shadow-sm rounded-4"><div class="card-body"><h5 class="mb-3">Add / Update Day</h5><form method="post" class="row g-3"><div class="col-md-6"><label class="form-label">Date</label><input type="date" class="form-control" name="holiday_date" required></div><div class="col-md-6"><label class="form-label">Type</label><select class="form-select" name="holiday_type"><option>Holiday</option><option>Vacation</option></select></div><div class="col-12"><label class="form-label">Title</label><input class="form-control" name="title" placeholder="Eid Holiday / National Day / Vacation" required></div><div class="col-12"><button class="btn btn-primary">Save Calendar Day</button></div></form></div></div></div>
  <div class="col-lg-7"><div class="card border-0 shadow-sm rounded-4"><div class="card-body"><form method="get" class="row g-3 align-items-end mb-3"><div class="col-md-4"><label class="form-label">Month</label><input type="month" class="form-control" name="month" value="{{ month }}"></div><div class="col-md-2"><button class="btn btn-primary">Load</button></div></form><div class="table-responsive"><table class="table"><thead><tr><th>Date</th><th>Title</th><th>Type</th><th></th></tr></thead><tbody>{% for row in rows %}<tr><td>{{ row.holiday_date }}</td><td>{{ row.title }}</td><td>{{ row.holiday_type }}</td><td><form method="post" action="{{ url_for('calendar_delete', holiday_id=row.id) }}" onsubmit="return confirm('Delete this calendar day?');"><button class="btn btn-sm btn-outline-danger">Delete</button></form></td></tr>{% else %}<tr><td colspan="4" class="text-secondary">No calendar entries for this month.</td></tr>{% endfor %}</tbody></table></div></div></div></div>
</div>
{% endblock %}
